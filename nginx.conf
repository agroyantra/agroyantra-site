server {
    listen 80;
    server_name agroyantra.com.np www.agroyantra.com.np;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agroyantra.com.np www.agroyantra.com.np;

    ssl_certificate /etc/letsencrypt/live/agroyantra.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agroyantra.com.np/privkey.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /var/www/agroyantra/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/agroyantra/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
