{% extends 'base.html' %}

{% block title %}Login - AgroYantra{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <i class="fas fa-seedling text-primary text-5xl mb-4"></i>
            <h1 class="text-3xl font-extrabold text-gray-900">Welcome back</h1>
            <p class="text-gray-500 mt-2">Sign in to your AgroYantra account</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8">
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 rounded-lg transition shadow">
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-6">
                Don't have an account?
                <a href="{% url 'register' %}" class="text-primary font-semibold hover:underline">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
