{% extends 'base.html' %}

{% block title %}Change Password - AgroYantra{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-8">
        <i class="fas fa-lock text-primary mr-2"></i>Change Password
    </h1>
    <div class="bg-white rounded-2xl shadow-sm p-8">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Current Password</label>
                <input type="password" name="current_password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">New Password</label>
                <input type="password" name="new_password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm New Password</label>
                <input type="password" name="confirm_password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 rounded-full transition">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
